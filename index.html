<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IME Tambang - Crafting Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#0D1117',
                        surface: '#161B22',
                        elevated: '#1C2128',
                        border: 'rgba(139, 148, 158, 0.12)',
                        teal: {
                            400: '#2DD4BF',
                            500: '#14B8A6',
                            600: '#0D9488',
                        },
                        gold: {
                            400: '#FBBF24',
                            500: '#F59E0B',
                        },
                        txt: {
                            primary: '#E6EDF3',
                            secondary: '#C9D1D9',
                            muted: '#8B949E',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0D1117;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(20, 184, 166, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(245, 158, 11, 0.04) 0%, transparent 50%);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: none;
        }
        input:focus {
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.4);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(139, 148, 158, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(139, 148, 158, 0.2); border-radius: 2px; }
    </style>
</head>

<body class="text-txt-primary font-sans antialiased h-screen overflow-hidden">

    <!-- Main Container - Full Height -->
    <div class="h-full flex flex-col max-w-7xl mx-auto">

        <!-- Header - Compact -->
        <header class="flex items-center justify-between px-4 py-2 border-b border-border shrink-0">
            <!-- Left: Logo + Tabs -->
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-teal-500 to-teal-600 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-bold text-txt-primary">IME Tambang</h1>
                        <p class="text-[9px] text-txt-muted">Crafting Optimizer</p>
                    </div>
                </div>
                <div class="h-6 w-px bg-border mx-1"></div>
                <nav class="flex gap-1">
                    <button id="nav-calculator" onclick="switchNav('calculator')" class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-all bg-teal-500/20 text-teal-400 border border-teal-500/30">
                        Calculator
                    </button>
                    <button id="nav-iteminfo" onclick="switchNav('iteminfo')" class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-all text-txt-muted hover:text-txt-secondary hover:bg-elevated">
                        Item Info
                    </button>
                </nav>
            </div>
            <!-- Right: Hitung Button (only visible in Calculator) -->
            <button id="btn-hitung" onclick="hitungOptimasi()" class="bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-white font-semibold px-4 py-2 rounded-lg transition-all flex items-center gap-2 text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                Hitung
            </button>
        </header>

        <!-- Content Area -->
        <main class="flex-1 flex flex-col lg:flex-row gap-3 p-3 min-h-0 overflow-hidden">

            <!-- Calculator Panel -->
            <div id="panel-calculator" class="flex-1 flex flex-col lg:flex-row gap-3 min-h-0">

                <!-- Left Panel: Inventory -->
                <div class="lg:w-5/12 bg-surface border border-border rounded-xl flex flex-col shrink-0">
                <div class="px-4 py-2 border-b border-border bg-elevated/50 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                        <h2 class="text-xs font-semibold text-txt-primary">Inventory</h2>
                    </div>
                    <span id="total-stok" class="text-[10px] text-txt-muted bg-elevated px-2 py-0.5 rounded font-mono">0 items</span>
                </div>

                <!-- Scrollable Grid Area -->
                <div class="flex-1 overflow-y-auto p-3 space-y-3">
                    <!-- Raw Materials -->
                    <div>
                        <div class="flex items-center gap-1.5 mb-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-orange-400"></span>
                            <span class="text-[10px] font-semibold text-txt-muted uppercase tracking-wider">Raw</span>
                        </div>
                        <div id="input-grid" class="grid grid-cols-3 gap-2">
                            <!-- Filled by JS -->
                        </div>
                    </div>

                    <!-- Gems -->
                    <div>
                        <div class="flex items-center gap-1.5 mb-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-pink-400"></span>
                            <span class="text-[10px] font-semibold text-txt-muted uppercase tracking-wider">Gems</span>
                        </div>
                        <div id="input-grid-gems" class="grid grid-cols-3 gap-2">
                            <!-- Filled by JS -->
                        </div>
                    </div>

                    <!-- Ingots -->
                    <div>
                        <div class="flex items-center gap-1.5 mb-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-cyan-400"></span>
                            <span class="text-[10px] font-semibold text-txt-muted uppercase tracking-wider">Ingots</span>
                        </div>
                        <div id="input-grid-ingots" class="grid grid-cols-3 gap-2">
                            <!-- Filled by JS -->
                        </div>
                    </div>

                    <!-- Base -->
                    <div>
                        <div class="flex items-center gap-1.5 mb-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-yellow-400"></span>
                            <span class="text-[10px] font-semibold text-txt-muted uppercase tracking-wider">Base</span>
                        </div>
                        <div id="input-grid-base" class="grid grid-cols-3 gap-2">
                            <!-- Filled by JS -->
                        </div>
                    </div>

                    <!-- Resources -->
                    <div>
                        <div class="flex items-center gap-1.5 mb-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
                            <span class="text-[10px] font-semibold text-txt-muted uppercase tracking-wider">Resources</span>
                        </div>
                        <div id="input-grid-resources" class="grid grid-cols-2 gap-2">
                            <!-- Filled by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Results (Side by Side) -->
            <div class="lg:w-7/12 flex flex-col shrink-0 gap-3">
                <!-- Individual Panel -->
                <div class="bg-surface border border-border rounded-xl flex flex-col" style="flex: 1; min-height: 0;">
                    <div class="px-3 py-2 border-b border-border bg-elevated/50 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                            </svg>
                            <h2 class="text-xs font-semibold text-txt-primary">Individual</h2>
                        </div>
                        <span id="result-count-individual" class="text-[10px] text-txt-muted bg-elevated px-2 py-0.5 rounded">0 items</span>
                    </div>
                    <div id="hasil-individual" class="flex-1 overflow-y-auto p-2">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- Combo Panel -->
                <div class="bg-surface border border-border rounded-xl flex flex-col" style="flex: 1; min-height: 0;">
                    <div class="px-3 py-2 border-b border-border bg-elevated/50 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                            </svg>
                            <h2 class="text-xs font-semibold text-txt-primary">Combo</h2>
                        </div>
                        <span id="result-count" class="text-[10px] text-txt-muted bg-elevated px-2 py-0.5 rounded">0 strategies</span>
                    </div>
                    <div id="hasil-combo" class="flex-1 overflow-y-auto p-2">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <!-- Item Info Panel -->
            <div id="panel-iteminfo" class="flex-1 min-h-0 hidden h-full">
                <div id="iteminfo-container" class="h-full w-full"></div>
            </div>
        </main>

        <!-- Stats Bar - Fixed Bottom -->
        <div id="stats-bar" class="grid grid-cols-6 gap-2 px-3 pb-3 shrink-0">
            <div class="bg-surface border border-border rounded-lg px-3 py-2 text-center">
                <p class="text-[9px] text-txt-muted mb-0.5">Total Penjualan</p>
                <p id="stat-penjualan" class="text-sm font-bold font-mono text-cyan-400">$0</p>
            </div>
            <div class="bg-surface border border-border rounded-lg px-3 py-2 text-center">
                <p class="text-[9px] text-txt-muted mb-0.5">Profit</p>
                <p id="stat-profit" class="text-sm font-bold font-mono text-emerald-400">$0</p>
            </div>
            <div class="bg-surface border border-border rounded-lg px-3 py-2 text-center">
                <p class="text-[9px] text-txt-muted mb-0.5">Harga Mentah</p>
                <p id="stat-modal" class="text-sm font-bold font-mono text-orange-400">$0</p>
            </div>
            <div class="bg-surface border border-border rounded-lg px-3 py-2 text-center">
                <p class="text-[9px] text-txt-muted mb-0.5">Bahan Pakai</p>
                <p id="stat-used" class="text-sm font-bold font-mono text-teal-400">0%</p>
            </div>
            <div class="bg-surface border border-border rounded-lg px-3 py-2 text-center">
                <p class="text-[9px] text-txt-muted mb-0.5">Produksi</p>
                <p id="stat-production" class="text-sm font-bold font-mono text-purple-400">0 pcs</p>
            </div>
            <div class="bg-surface border border-border rounded-lg px-3 py-2 text-center">
                <p class="text-[9px] text-txt-muted mb-0.5">Strategi</p>
                <p id="stat-strategies" class="text-sm font-bold font-mono text-blue-400">0</p>
            </div>
        </div>

    </div>

    <script>
        // ============================================
        // CONSTANTS
        // ============================================
        const STORAGE_KEY = 'imeTambang_inventory';  // Fix #1: single consistent key

        // Fix #10: global CAT_COLORS (was duplicated in two render functions)
        const CAT_COLORS = {
            "Raw":       { bg: 'bg-orange-950/50', text: 'text-orange-400', bar: 'bg-orange-500' },
            "Scraps":    { bg: 'bg-slate-800/50',  text: 'text-slate-400',  bar: 'bg-slate-500' },
            "Ingots":    { bg: 'bg-gray-800/50',   text: 'text-gray-400',   bar: 'bg-gray-500'  },
            "Gems":      { bg: 'bg-pink-950/50',   text: 'text-pink-400',   bar: 'bg-pink-500'  },
            "Base":      { bg: 'bg-cyan-950/50',   text: 'text-cyan-400',   bar: 'bg-cyan-500'  },
            "Necklaces": { bg: 'bg-yellow-950/50', text: 'text-yellow-400', bar: 'bg-yellow-500' },
            "Rings":     { bg: 'bg-teal-950/50',   text: 'text-teal-400',   bar: 'bg-teal-500'  },
            "Earrings":  { bg: 'bg-violet-950/50', text: 'text-violet-400', bar: 'bg-violet-500' }
        };

        // ============================================
        // STATE
        // ============================================
        let database = null;
        let itemMap = new Map();      // Fix #5: O(1) name→item lookup
        let processedItems = [];      // Fix #7: cached filtered items (have ingredients, not Base)

        let rawMaterials = [];
        let gems = [];
        let ingots = [];
        let base = [];
        let resources = [];

        let currentComboResult = null;
        let completedComboItems = new Set();
        let pendingComboItems = new Set();
        let currentIndividualResult = null;
        let itemInfoFilter = { category: 'semua', sort: 'margin-desc', search: '' };

        // ============================================
        // UTILITY
        // ============================================
        // Fix #6: debounce helper for search input
        function debounce(fn, delay) {
            let timer;
            return function (...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // Fix #11: single helper to read all inputs into stokUser object
        function getStokUser() {
            const stok = {};
            [...rawMaterials, ...gems, ...ingots, ...base, ...resources].forEach(mat => {
                const input = document.getElementById(`input-${mat.replace(/ /g, '_')}`);
                if (input) stok[mat] = parseInt(input.value) || 0;
            });
            return stok;
        }

        // ============================================
        // LOAD DATABASE
        // ============================================
        async function loadDatabase() {
            try {
                // Fix #12: removed ?t=Date.now() cache-busting (not needed for static file)
                const response = await fetch('smelting_database.json');
                if (!response.ok) throw new Error('Gagal membaca file JSON: ' + response.status);
                const rawDb = await response.json();

                // Fix #5: Build recipeMap for O(1) lookup instead of .find() inside .map()
                const recipeMap = new Map(rawDb.recipes.map(r => [r.name, r.ingredients]));

                database = {
                    raw_sell_prices: rawDb.raw_sell_prices,
                    items: rawDb.items.map(item => ({
                        ...item,
                        ingredients: recipeMap.get(item.name) || {}
                    }))
                };

                // Fix #5: Build O(1) item lookup map
                itemMap = new Map(database.items.map(i => [i.name, i]));

                // Fix #7: Cache processed items once (items with ingredients, not Base)
                processedItems = database.items.filter(item =>
                    item.ingredients && Object.keys(item.ingredients).length > 0 && item.category !== 'Base'
                );

                // Populate category arrays
                rawMaterials = rawDb.items.filter(i => i.category === 'Raw').map(i => i.name);
                gems         = rawDb.items.filter(i => i.category === 'Gems').map(i => i.name);
                ingots       = rawDb.items.filter(i => i.category === 'Ingots').map(i => i.name);
                base         = rawDb.items.filter(i => i.category === 'Base').map(i => i.name);
                resources    = rawDb.items.filter(i => i.category === 'Scraps').map(i => i.name);

                // Fix #9: single renderAllGrids() instead of 5 separate calls
                renderAllGrids();
                loadInventoryFromStorage();
                addInputListeners();

                if (document.getElementById('panel-iteminfo') && !document.getElementById('panel-iteminfo').classList.contains('hidden')) {
                    renderItemInfo();
                }
            } catch (error) {
                console.error('Error loading database:', error);
                document.getElementById('input-grid').innerHTML = `
                    <div class="col-span-3 text-center text-red-400 text-xs py-4">
                        Gagal memuat database. Pastikan pakai web server lokal.
                    </div>
                `;
            }
        }

        // ============================================
        // LOCAL STORAGE
        // ============================================
        // Fix #1: removed duplicate STORAGE_KEY const (now declared globally above)
        // Fix #14: removed dead loadInventory() function (was never called, used wrong key)

        function saveInventoryToStorage() {
            const inventory = {};
            [...rawMaterials, ...gems, ...ingots, ...base, ...resources].forEach(mat => {
                const input = document.getElementById(`input-${mat.replace(/ /g, '_')}`);
                if (input) inventory[mat] = parseInt(input.value) || 0;
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
        }

        function loadInventoryFromStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const inventory = JSON.parse(saved);
                    Object.entries(inventory).forEach(([mat, qty]) => {
                        const input = document.getElementById(`input-${mat.replace(/ /g, '_')}`);
                        if (input) input.value = qty;
                    });
                }
            } catch (e) {
                console.error('No saved inventory:', e);
            }
            updateTotalStok();
        }

        // Fix #8: display "N items" correctly (was showing bare number after initial render)
        function updateTotalStok() {
            let totalStok = 0;
            [...rawMaterials, ...resources].forEach(mat => {
                const el = document.getElementById(`input-${mat.replace(/ /g, '_')}`);
                totalStok += el ? (parseInt(el.value) || 0) : 0;
            });
            document.getElementById('total-stok').textContent = `${totalStok} items`;
        }

        function addInputListeners() {
            [...rawMaterials, ...resources].forEach(mat => {
                const input = document.getElementById(`input-${mat.replace(/ /g, '_')}`);
                if (input) {
                    input.addEventListener('input', () => {
                        saveInventoryToStorage();
                        updateTotalStok();
                    });
                }
            });
        }

        // ============================================
        // RENDER INPUTS (Generic)
        // ============================================
        // Fix #9: replaced 5 near-identical functions with one generic renderer
        // Fix #4: uses .map().join('') instead of innerHTML += in a loop
        // Fix #5: uses itemMap.get() for O(1) lookup instead of .find()
        function renderMaterialGrid(containerId, materials, colorClass, getPriceFn) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = materials.map(mat => {
                const priceDisplay = getPriceFn ? getPriceFn(mat) : '-';
                return `
                    <div class="bg-elevated border border-border rounded-lg p-2 flex flex-col items-center">
                        <input
                            type="number"
                            id="input-${mat.replace(/ /g, '_')}"
                            value="0"
                            min="0"
                            class="w-full bg-void border border-border rounded px-1.5 py-1 text-center font-mono font-semibold text-sm ${colorClass} focus:outline-none"
                        >
                        <span class="text-[9px] text-txt-muted mt-1 text-center leading-tight">${mat}</span>
                        <span class="text-[8px] text-gold-400 font-mono">${priceDisplay}</span>
                    </div>
                `;
            }).join('');
        }

        function renderAllGrids() {
            renderMaterialGrid('input-grid', rawMaterials, 'text-teal-400', mat => {
                const p = database.raw_sell_prices[mat];
                return mat === 'Coal' ? `$${p}` : '-';
            });
            renderMaterialGrid('input-grid-gems', gems, 'text-pink-400', mat => {
                const item = itemMap.get(mat);  // O(1) lookup
                return item ? `$${item.sell_price}` : '-';
            });
            renderMaterialGrid('input-grid-ingots', ingots, 'text-cyan-400', mat => {
                const item = itemMap.get(mat);  // O(1) lookup
                return item ? `$${item.sell_price}` : '-';
            });
            renderMaterialGrid('input-grid-base', base, 'text-yellow-400', null);
            renderMaterialGrid('input-grid-resources', resources, 'text-teal-400', mat => {
                const p = database.raw_sell_prices[mat];
                return p !== undefined ? `$${p}` : '-';
            });
        }

        // ============================================
        // OPTIMIZATION ALGORITHM
        // ============================================
        function hitungProfitPerPcs(strategi) {
            let modal = 0;
            for (let [bahan, qty] of Object.entries(strategi.ingredients)) {
                modal += qty * (database.raw_sell_prices[bahan] || 0);
            }
            return strategi.sell_price - modal;
        }

        // Fix #7: uses cached processedItems instead of re-filtering each call
        function hitungIndividualRankings(stokUser) {
            let results = processedItems.map(strategi => {
                const profitSatuan = hitungProfitPerPcs(strategi);

                let maxBisa = Infinity;
                let bahanKekurangan = null;

                for (let [bahan, butuhQty] of Object.entries(strategi.ingredients)) {
                    const tersedia = stokUser[bahan] || 0;
                    const hitung = Math.floor(tersedia / butuhQty);
                    if (hitung < maxBisa) {
                        maxBisa = hitung;
                        bahanKekurangan = bahan;
                    }
                }

                return {
                    nama: strategi.name,
                    category: strategi.category,
                    sellPrice: strategi.sell_price,
                    profitSatuan,
                    maxBisa: maxBisa === Infinity ? 9999 : maxBisa,
                    bahanKekurangan: maxBisa === 0 ? bahanKekurangan : null,
                    ingredients: strategi.ingredients
                };
            });

            results = results.filter(r => r.maxBisa > 0);
            results.sort((a, b) => b.profitSatuan - a.profitSatuan);
            return results;
        }

        // Fix #3: categoryProfit NaN fixed — uses (x || 0) + n pattern
        // Fix #7: uses cached processedItems
        // Fix #15: removed unused remainingMaterials variable
        function hitungComboGreedy(stokUser) {
            let strategies = processedItems.map(s => ({
                ...s,
                profitSatuan: hitungProfitPerPcs(s)
            }));
            strategies.sort((a, b) => b.profitSatuan - a.profitSatuan);

            let stokTersisa = { ...stokUser };
            let comboResults = [];
            let categoryProfit = {};
            let totalBahanTerpakai = 0;
            let totalHargaMentah = 0;
            const totalBahanAwal = Object.values(stokUser).reduce((s, v) => s + v, 0);

            // Inner helper to avoid code duplication between Phase 1 and Phase 2
            function processStrategy(strategi) {
                let maxBisa = Infinity;
                for (let [bahan, qty] of Object.entries(strategi.ingredients)) {
                    const hitung = Math.floor((stokTersisa[bahan] || 0) / qty);
                    if (hitung < maxBisa) maxBisa = hitung;
                }
                if (maxBisa <= 0) return;

                const profitTotal = strategi.profitSatuan * maxBisa;
                let modalStrategi = 0;
                const rincian = [];

                for (let [bahan, qty] of Object.entries(strategi.ingredients)) {
                    stokTersisa[bahan] = (stokTersisa[bahan] || 0) - qty * maxBisa;
                    modalStrategi += qty * (database.raw_sell_prices[bahan] || 0);
                    rincian.push(`${qty * maxBisa}x ${bahan}`);
                    totalBahanTerpakai += qty * maxBisa;
                }

                comboResults.push({
                    nama: strategi.name,
                    category: strategi.category,
                    ingredients: strategi.ingredients,
                    jumlah: maxBisa,
                    profitSatuan: strategi.profitSatuan,
                    profitTotal,
                    modalTotal: modalStrategi * maxBisa,
                    rincian: rincian.join(' + ')
                });

                // Fix #3: safe accumulation — avoids undefined += number → NaN
                categoryProfit[strategi.category] = (categoryProfit[strategi.category] || 0) + profitTotal;
                totalHargaMentah += modalStrategi * maxBisa;
            }

            // Phase 1: profitable strategies first
            for (let strategi of strategies) {
                if (strategi.profitSatuan <= 0) continue;
                processStrategy(strategi);
            }

            // Phase 2: loss-making strategies to use remaining materials
            for (let strategi of strategies) {
                if (strategi.profitSatuan > 0) continue;
                const usesRemaining = Object.keys(strategi.ingredients)
                    .some(bahan => (stokTersisa[bahan] || 0) > 0);
                if (usesRemaining) processStrategy(strategi);
            }

            const totalProfit = comboResults.reduce((s, i) => s + i.profitTotal, 0);
            const totalProduksi = comboResults.reduce((s, i) => s + i.jumlah, 0);

            return {
                strategies: comboResults,
                summary: {
                    totalProfit,
                    totalProduksi,
                    totalHargaMentah,
                    percentageUsed: totalBahanAwal > 0 ? Math.round((totalBahanTerpakai / totalBahanAwal) * 100) : 0,
                    categoryProfit,
                    remainingMaterials: stokTersisa
                }
            };
        }

        function confirmAllPending() {
            if (pendingComboItems.size === 0) return;

            pendingComboItems.forEach(index => {
                const item = currentComboResult.strategies[index];
                if (!item) return;
                completedComboItems.add(index);
                for (let [bahan, qty] of Object.entries(item.ingredients)) {
                    const input = document.getElementById('input-' + bahan.replace(/ /g, '_'));
                    if (input) input.value = Math.max(0, (parseInt(input.value) || 0) - qty * item.jumlah);
                }
            });

            saveInventoryToStorage();

            pendingComboItems.forEach(index => {
                const card  = document.getElementById('combo-item-' + index);
                const badge = document.getElementById('combo-status-' + index);
                if (card)  { card.classList.add('opacity-50', 'line-through'); card.classList.remove('border-yellow-500/40', 'hover:border-purple-500/40'); }
                if (badge) badge.textContent = '✓ DONE';
            });

            pendingComboItems.clear();
            hideConfirmButtons();
            recalculateIndividual();
        }

        function cancelAllPending() {
            pendingComboItems.forEach(index => {
                const card = document.getElementById('combo-item-' + index);
                if (card) card.classList.remove('border-yellow-500/40');

            pendingComboItems.clear();

                    <span>✗</span> Cancel
                </button>
            `;
        }

        function hideConfirmButtons() {
            document.getElementById('confirm-combo-btns')?.remove();
        }

        function completeComboItem(index) {
            if (!currentComboResult) return;
            const item = currentComboResult.strategies[index];
            if (!item) return;

            if (completedComboItems.has(index)) {
                completedComboItems.delete(index);
                for (let [bahan, qty] of Object.entries(item.ingredients)) {
                    const input = document.getElementById('input-' + bahan.replace(/ /g, '_'));
                    if (input) input.value = (parseInt(input.value) || 0) + qty * item.jumlah;
                }
                const card  = document.getElementById('combo-item-' + index);
                const badge = document.getElementById('combo-status-' + index);
                if (card)  { card.classList.remove('opacity-50', 'line-through'); card.classList.add('hover:border-purple-500/40'); }
                if (badge) badge.textContent = '';
                saveInventoryToStorage();
                recalculateIndividual();
                return;
            }

            const card = document.getElementById('combo-item-' + index);
            if (pendingComboItems.has(index)) {
                pendingComboItems.delete(index);
                card?.classList.remove('border-yellow-500/40');
            } else {
                pendingComboItems.add(index);
                card?.classList.add('border-yellow-500/40');
            }
            pendingComboItems.size > 0 ? showConfirmButtons() : hideConfirmButtons();
        }

            const comboItem = e.target.closest('[data-combo-index]');
            if (comboItem) {
                completeComboItem(parseInt(comboItem.getAttribute('data-combo-index')));
            }
        });
    </script>
</body>
